<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#1a1a2e" stroke="#2a2a4a" stroke-width="1"/>
  <!-- Globe grid -->
  <circle cx="100" cy="105" r="52" fill="none" stroke="#3a3a5a" stroke-width="1.2"/>
  <ellipse cx="100" cy="105" rx="52" ry="20" fill="none" stroke="#3a3a5a" stroke-width="0.8"/>
  <ellipse cx="100" cy="105" rx="20" ry="52" fill="none" stroke="#3a3a5a" stroke-width="0.8"/>
  <line x1="48" y1="105" x2="152" y2="105" stroke="#3a3a5a" stroke-width="0.8"/>
  <line x1="100" y1="53" x2="100" y2="157" stroke="#3a3a5a" stroke-width="0.8"/>
  <!-- Latitude lines -->
  <ellipse cx="100" cy="80" rx="48" ry="12" fill="none" stroke="#3a3a5a" stroke-width="0.5"/>
  <ellipse cx="100" cy="130" rx="48" ry="12" fill="none" stroke="#3a3a5a" stroke-width="0.5"/>
  <!-- Map pin -->
  <g transform="translate(120, 72)">
    <path d="M0,0 C-8,0 -14,6 -14,14 C-14,24 0,36 0,36 C0,36 14,24 14,14 C14,6 8,0 0,0Z" fill="#059669" opacity="0.9"/>
    <circle cx="0" cy="14" r="5" fill="#1a1a2e"/>
  </g>
  <!-- Eye accent (opticon brand) -->
  <g transform="translate(100, 38)">
    <ellipse cx="0" cy="0" rx="14" ry="8" fill="none" stroke="#059669" stroke-width="1.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#059669" opacity="0.7"/>
    <circle cx="0" cy="0" r="1.5" fill="#1a1a2e"/>
  </g>
  <!-- Data points on globe -->
  <circle cx="75" cy="95" r="2.5" fill="#059669" opacity="0.6"/>
  <circle cx="88" cy="120" r="2" fill="#059669" opacity="0.5"/>
  <circle cx="130" cy="110" r="2.5" fill="#059669" opacity="0.6"/>
  <circle cx="110" cy="140" r="2" fill="#059669" opacity="0.4"/>
  <circle cx="70" cy="115" r="1.5" fill="#059669" opacity="0.5"/>
  <!-- Pulse rings on active point -->
  <circle cx="120" cy="86" r="6" fill="none" stroke="#059669" stroke-width="0.5" opacity="0.3"/>
  <circle cx="120" cy="86" r="10" fill="none" stroke="#059669" stroke-width="0.3" opacity="0.15"/>
</svg>
